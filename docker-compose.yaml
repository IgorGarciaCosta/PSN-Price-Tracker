services:
  psn-price-tracker:
    build: .
    container_name: psn-price-tracker
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - sqlite-data:/app/data
    environment:
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/psntracker.db
      - Telegram__BotToken=${TELEGRAM_BOT_TOKEN}
      - Telegram__ChatId=${TELEGRAM_CHAT_ID}
      - Monitoramento__IntervaloMinutos=${MONITORAMENTO_INTERVALO:-60}

volumes:
  sqlite-data:
